name: Convert ONNX to K210 kmodel

on:
  push:
    paths:
      - "convert_kmodel.py"
      - ".github/workflows/kmodel.yml"
  workflow_dispatch:
    inputs:
      input_size:
        description: "Input size (224/320/640)"
        default: "320"
      quantize:
        description: "INT8 quantization"
        default: "true"
        options:
          - "true"
          - "false"

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Download ONNX model
        run: |
          echo "Downloading ONNX from maixcam-convert repo..."
          curl -L -o best.onnx \
            "https://raw.githubusercontent.com/list-one1/maixcam-convert/main/best.onnx" \
            || curl -L -o best.onnx \
            "https://github.com/list-one1/maixcam-convert/raw/main/best.onnx" \
            || wget -O best.onnx \
            "https://raw.githubusercontent.com/list-one1/maixcam-convert/main/best.onnx"

          echo "ONNX size: $(stat -c%s best.onnx) bytes"

          # Verify it's a valid ONNX (not LFS pointer)
          python3 -c "
          data = open('best.onnx', 'rb').read(100)
          if data.startswith(b'version https://git-lfs'):
              print('ERROR: Got LFS pointer, checking out LFS file')
              import os
              os.system('git lfs pull --include=best.onnx')
          else:
              print('ONNX file looks valid')
          "

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nncase onnx onnxruntime numpy

      - name: Convert ONNX to kmodel
        run: |
          INPUT_SIZE="${{ inputs.input_size || '320' }}"
          QUANTIZE="${{ inputs.quantize || 'true' }}"

          echo "=== K210 kmodel Conversion ==="
          echo "Input size: ${INPUT_SIZE}x${INPUT_SIZE}"
          echo "Quantize: ${QUANTIZE}"

          if [ "$QUANTIZE" = "true" ]; then
            python convert_kmodel.py \
              --input best.onnx \
              --output best.kmodel \
              --target k210 \
              --input-size ${INPUT_SIZE}
          else
            python convert_kmodel.py \
              --input best.onnx \
              --output best.kmodel \
              --target k210 \
              --input-size ${INPUT_SIZE} \
              --no-quantize
          fi

      - name: Verify kmodel
        run: |
          if [ -f best.kmodel ]; then
            SIZE_KB=$(stat -c%s best.kmodel)
            SIZE_MB=$(echo "scale=2; $SIZE_KB / 1048576" | bc)
            echo "kmodel size: ${SIZE_KB} bytes (${SIZE_MB} MB)"
            if [ $SIZE_KB -gt 6291456 ]; then
              echo "::warning::kmodel exceeds 6MB limit!"
            else
              echo "::notice:: kmodel within 6MB limit"
            fi
          else
            echo "ERROR: kmodel not generated"
            exit 1
          fi

      - name: Upload kmodel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmodel
          path: |
            best.kmodel
          retention-days: 90
