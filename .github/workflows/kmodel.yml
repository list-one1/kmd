name: Convert YOLOv2 ONNX to K210 kmodel

on:
  push:
    paths:
      - "best.onnx"
      - "convert_kmodel.py"
      - ".github/workflows/kmodel.yml"
  workflow_dispatch:
    inputs:
      input_size:
        description: "Input size (px)"
        default: "215"
      quantize:
        description: "INT8 quantization"
        default: "true"
        options:
          - "true"
          - "false"

jobs:
  convert:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nncase onnx onnxruntime numpy

      - name: Inspect model
        run: |
          python3 -c "
          import onnx, os
          m = onnx.load('best.onnx')
          print(f'Size: {os.path.getsize(\"best.onnx\")/1024:.0f} KB')
          for i in m.graph.input:
              s = [d.dim_value for d in i.type.tensor_type.shape.dim]
              print(f'Input: {i.name} shape={s}')
          for o in m.graph.output:
              s = [d.dim_value for d in o.type.tensor_type.shape.dim]
              print(f'Output: {o.name} shape={s}')
          from collections import Counter
          ops = Counter([n.op_type for n in m.graph.node])
          print(f'Nodes: {len(m.graph.node)}')
          print(f'Ops: {dict(ops)}')
          "

      - name: Convert to kmodel
        run: |
          INPUT_SIZE="${{ inputs.input_size || '215' }}"
          QUANTIZE="${{ inputs.quantize || 'true' }}"

          echo "=== YOLOv2 -> K210 kmodel ==="
          echo "Input: ${INPUT_SIZE}x${INPUT_SIZE}"

          if [ "$QUANTIZE" = "true" ]; then
            python convert_kmodel.py \
              --input best.onnx \
              --output best.kmodel \
              --target k210 \
              --input-size ${INPUT_SIZE}
          else
            python convert_kmodel.py \
              --input best.onnx \
              --output best.kmodel \
              --target k210 \
              --input-size ${INPUT_SIZE} \
              --no-quantize
          fi

      - name: Verify kmodel
        run: |
          if [ -f best.kmodel ]; then
            SIZE_BYTES=$(stat -c%s best.kmodel)
            SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
            echo "kmodel: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"

            MAX_BYTES=6291456
            if [ $SIZE_BYTES -gt $MAX_BYTES ]; then
              echo "::error::kmodel ${SIZE_MB}MB exceeds 6MB limit!"
              exit 1
            else
              echo "::notice:: kmodel ${SIZE_MB}MB - within 6MB limit"
            fi
          else
            echo "::error::kmodel not generated!"
            exit 1
          fi

      - name: Upload kmodel
        uses: actions/upload-artifact@v4
        with:
          name: kmodel-k210
          path: best.kmodel
          retention-days: 90
