name: K210 kmodel verification

on:
  push:
    paths:
      - "best.onnx"
      - "best.kmodel"
      - ".github/workflows/kmodel.yml"
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify kmodel
        run: |
          if [ ! -f best.kmodel ]; then
            echo "ERROR: best.kmodel not found"
            exit 1
          fi
          SIZE_BYTES=$(stat -c%s best.kmodel)
          SIZE_MB=$(echo "scale=2; $SIZE_BYTES / 1048576" | bc)
          echo "kmodel: ${SIZE_BYTES} bytes (${SIZE_MB} MB)"
          if [ $(echo "$SIZE_MB > 6.0" | bc) -eq 1 ]; then
            echo "ERROR: kmodel exceeds 6MB limit!"
            exit 1
          fi
          echo "PASS: kmodel ${SIZE_MB} MB (limit 6 MB)"

      - name: Upload kmodel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmodel-k210
          path: best.kmodel
          retention-days: 90
