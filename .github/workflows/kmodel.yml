name: Convert YOLOv2 ONNX to K210 kmodel

on:
  push:
    paths:
      - "best.onnx"
      - "convert_kmodel.py"
      - ".github/workflows/kmodel.yml"
  workflow_dispatch:
    inputs:
      quantize:
        description: "INT8 quantization"
        default: "true"
        options:
          - "true"
          - "false"

jobs:
  convert:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install nncase==1.9.0.20230322 onnx onnxruntime numpy

      - name: Inspect ONNX model
        run: |
          python3 -c "
          import onnx, os
          from collections import Counter
          m = onnx.load('best.onnx')
          print(f'Size: {os.path.getsize(\"best.onnx\")/1024:.0f} KB')
          for i in m.graph.input:
              s = [d.dim_value for d in i.type.tensor_type.shape.dim]
              print(f'Input: {i.name} shape={s}')
          for o in m.graph.output:
              s = [d.dim_value for d in o.type.tensor_type.shape.dim]
              print(f'Output: {o.name} shape={s}')
          ops = Counter([n.op_type for n in m.graph.node])
          print(f'Nodes: {len(m.graph.node)}')
          print(f'Ops: {dict(ops)}')
          "

      - name: Convert ONNX to kmodel
        run: |
          QUANTIZE="${{ inputs.quantize || 'true' }}"

          if [ "$QUANTIZE" = "true" ]; then
            python3 convert_kmodel.py --input best.onnx --output best.kmodel --target k210
          else
            python3 convert_kmodel.py --input best.onnx --output best.kmodel --target k210 --no-quantize
          fi

      - name: Verify kmodel
        run: |
          if [ -f best.kmodel ]; then
            SIZE_BYTES=$(stat -c%s best.kmodel)
            SIZE_KB=$(echo "scale=1; $SIZE_BYTES / 1024" | bc)
            echo "kmodel: ${SIZE_BYTES} bytes (${SIZE_KB} KB)"

            MAX_BYTES=6291456
            if [ $SIZE_BYTES -gt $MAX_BYTES ]; then
              echo "::error::kmodel exceeds 6MB limit!"
              exit 1
            else
              echo "::notice::kmodel within 6MB limit"
            fi
          else
            echo "::error::kmodel not generated!"
            exit 1
          fi

      - name: Upload kmodel artifact
        uses: actions/upload-artifact@v4
        with:
          name: kmodel-k210
          path: best.kmodel
          retention-days: 90
